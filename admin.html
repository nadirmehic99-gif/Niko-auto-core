<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Niko Admin | User Manager</title>
<style>
:root{--card:#141c27;--panel:#080d16;--border:#2a3444;--gold:#e0aa18;--green:#35b84d;--text:#f4f6fb;--muted:#9aa3b2;--red:#ff6b6b}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#050811,#101725);color:var(--text)}
.wrap{max-width:1000px;margin:auto;padding:42px 18px 80px}.card{background:rgba(20,28,39,.96);border:1px solid var(--border);border-radius:24px;padding:28px;margin:22px 0}
h1{font-size:clamp(34px,7vw,58px);margin:35px 0 18px;letter-spacing:1px;font-weight:900}.gold{color:var(--gold)}
p,li{color:var(--muted);font-size:19px;line-height:1.45}
input,select,button{font-size:18px;border-radius:14px}
input,select{width:100%;padding:14px;background:var(--panel);color:var(--text);border:1px solid var(--border);outline:none;margin:6px 0}
button{background:var(--gold);border:0;color:#111;font-weight:900;padding:14px 18px;cursor:pointer;margin:8px 0}
button.secondary{background:transparent;border:1px solid var(--gold);color:var(--gold)}
button.red{background:#ff6b6b;color:#111}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 120px;gap:10px;align-items:end}
table{width:100%;border-collapse:collapse;margin-top:18px}
th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left}
th{color:var(--gold)}.hidden{display:none}.status{color:var(--muted)}
.locked{color:#ff6b6b;font-weight:900}.open{color:#35b84d;font-weight:900}
@media(max-width:760px){.grid{grid-template-columns:1fr} table{font-size:13px} th,td{padding:7px}}
</style>
</head>
<body>
<main class="wrap">
<section id="loginCard" class="card">
<h1><span class="gold">NIKO</span> ADMIN</h1>
<p>Login to manage customer usernames and passwords.</p>
<input id="adminPass" type="password" placeholder="Admin password" />
<button onclick="adminLogin()">Login</button>
<p class="status">Admin password: <b>mafija1</b></p>
</section>

<section id="adminCard" class="card hidden">
<h1><span class="gold">USER</span> MANAGER</h1>
<p>Add customers, lock/unlock customers, then download <b>users.json</b> and replace it in GitHub.</p>

<div class="grid">
  <div><label>Name</label><input id="name" placeholder="Customer Name"></div>
  <div><label>Company</label><input id="company" placeholder="Company"></div>
  <div><label>Username</label><input id="username" placeholder="customer51"></div>
  <div><label>Password</label><input id="password" placeholder="Niko1051"></div>
  <div><label>Active</label><select id="active"><option value="true">Open</option><option value="false">Locked</option></select></div>
</div>

<button onclick="addUser()">Add / Update Customer</button>
<button class="secondary" onclick="downloadUsers()">Download users.json</button>
<button class="secondary" onclick="loadCurrentUsers()">Load current users.json</button>

<p id="status" class="status">After download, upload/replace users.json in GitHub.</p>

<table>
<thead><tr><th>Name</th><th>Company</th><th>Username</th><th>Password</th><th>Status</th><th>Action</th><th>Remove</th></tr></thead>
<tbody id="userBody"></tbody>
</table>
</section>
</main>

<script>
const ADMIN_PASSWORD = "mafija1";
let users = [];

function starterUsers(){
  users = [];
  for(let i=1;i<=50;i++){
    const n = String(i).padStart(2,"0");
    users.push({name:"Customer "+n, company:"Company "+n, username:"customer"+n, password:"Niko"+(1000+i), active:true, notes:""});
  }
}

function adminLogin(){
  if(document.getElementById("adminPass").value === ADMIN_PASSWORD){
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("adminCard").classList.remove("hidden");
    loadCurrentUsers();
  }else{
    alert("Wrong admin password");
  }
}

async function loadCurrentUsers(){
  try{
    const res = await fetch("users.json?cache=" + Date.now());
    if(!res.ok) throw new Error("users.json not found");
    users = await res.json();
    renderUsers();
    document.getElementById("status").textContent = "Loaded current users.json.";
  }catch(e){
    starterUsers();
    renderUsers();
    document.getElementById("status").textContent = "Using starter 50 users.";
  }
}

function addUser(){
  const name = document.getElementById("name").value.trim();
  const company = document.getElementById("company").value.trim();
  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const active = document.getElementById("active").value === "true";
  if(!username || !password){ alert("Username and password required"); return; }
  const existing = users.findIndex(u => String(u.username).toLowerCase() === username);
  const user = {name:name || username, company, username, password, active, notes:""};
  if(existing >= 0) users[existing] = user; else users.push(user);
  ["name","company","username","password"].forEach(id => document.getElementById(id).value = "");
  renderUsers();
}

function removeUser(i){
  if(confirm("Remove this customer?")){
    users.splice(i,1);
    renderUsers();
  }
}

function toggleActive(i){
  users[i].active = users[i].active === false ? true : false;
  renderUsers();
}

function renderUsers(){
  const body = document.getElementById("userBody");
  body.innerHTML = "";
  users.forEach((u,i) => {
    const tr = document.createElement("tr");
    const active = u.active !== false;
    tr.innerHTML = `
      <td>${u.name || ""}</td>
      <td>${u.company || ""}</td>
      <td>${u.username}</td>
      <td>${u.password}</td>
      <td class="${active ? "open" : "locked"}">${active ? "OPEN" : "LOCKED"}</td>
      <td><button class="secondary" onclick="toggleActive(${i})">${active ? "Lock" : "Open"}</button></td>
      <td><button class="red" onclick="removeUser(${i})">Remove</button></td>
    `;
    body.appendChild(tr);
  });
}

function downloadUsers(){
  const blob = new Blob([JSON.stringify(users, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "users.json";
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById("status").textContent = "Downloaded users.json. Replace users.json in GitHub.";
}
</script>
</body>
</html>
